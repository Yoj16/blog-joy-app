apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blog-db
  template:
    metadata:
      labels:
        app: blog-db
    spec:
      securityContext:
        fsGroup: 999
      containers:
        - name: mysql
          image: mysql:8.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: mysql
              containerPort: 3306
              protocol: TCP
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: rootpassword
            - name: MYSQL_DATABASE
              value: blog
            - name: MYSQL_USER
              value: blog
            - name: MYSQL_PASSWORD
              value: blog123
          readinessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: blog-db
spec:
  selector:
    app: blog-db
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog-joy-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blog-joy-app
  template:
    metadata:
      labels:
        app: blog-joy-app
    spec:
      containers:
        - name: blog-joy-app
          image: harbor.kakor.ovh/ipim2il/blog-joy-app:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "8080"
            - name: DB_HOST
              value: blog-db
            - name: DB_NAME
              value: blog
            - name: DB_USER
              value: blog
            - name: DB_PASSWORD
              value: blog123
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 5
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: blog-joy-app
spec:
  selector:
    app: blog-joy-app
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: blog-joy-app
spec:
  to:
    kind: Service
    name: blog-joy-app
  port:
    targetPort: 80
  tls:
    termination: edge

