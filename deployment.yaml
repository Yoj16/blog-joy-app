apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blog-db
  template:
    metadata:
      labels:
        app: blog-db
    spec:
      securityContext:
        fsGroup: 999
      containers:
        - name: mysql
          image: mysql:8.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: mysql
              containerPort: 3306
              protocol: TCP
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: rootpassword
            - name: MYSQL_DATABASE
              value: blog
            - name: MYSQL_USER
              value: blog
            - name: MYSQL_PASSWORD
              value: blog123
          readinessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: blog-db
spec:
  selector:
    app: blog-db
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blog-app
  template:
    metadata:
      labels:
        app: blog-app
    spec:
      securityContext:
        runAsNonRoot: true
        fsGroup: 1001
      containers:
        - name: blog-app
          image: harbor.kakor.ovh/ipim2il/blog-joy-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80   # ✅ IMPORTANT FIX
          securityContext:
            runAsUser: 1001
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: DB_HOST
              value: blog-db
            - name: DB_NAME
              value: blog
            - name: DB_USER
              value: blog
            - name: DB_PASSWORD
              value: blog123
          readinessProbe:
            tcpSocket:
              port: 80   # ✅ évite crash HTTP probe
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: blog-app
spec:
  selector:
    app: blog-app
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: blog-app
spec:
  to:
    kind: Service
    name: blog-app
  port:
    targetPort: http
  tls:
    termination: edge