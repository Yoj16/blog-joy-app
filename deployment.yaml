apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blog-db
  template:
    metadata:
      labels:
        app: blog-db
    spec:
      securityContext:
        fsGroup: 0
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: rootpassword
            - name: MYSQL_DATABASE
              value: blog
            - name: MYSQL_USER
              value: blog
            - name: MYSQL_PASSWORD
              value: blog123
---
apiVersion: v1
kind: Service
metadata:
  name: blog-db
spec:
  selector:
    app: blog-db
  ports:
    - port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blog-app
  template:
    metadata:
      labels:
        app: blog-app
    spec:
      securityContext:
        runAsNonRoot: true
        fsGroup: 0
      containers:
        - name: blog-app
          image: harbor.kakor.ovh/ipim2il/blog-joy-app:latest
          ports:
            - containerPort: 8080
          securityContext:
            runAsUser: 1001
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          env:
            - name: DB_HOST
              value: blog-db
            - name: DB_NAME
              value: blog
            - name: DB_USER
              value: blog
            - name: DB_PASSWORD
              value: blog123
---
apiVersion: v1
kind: Service
metadata:
  name: blog-app
spec:
  selector:
    app: blog-app
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: blog-app
spec:
  to:
    kind: Service
    name: blog-app
  port:
    targetPort: 80